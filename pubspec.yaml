name: mobile_payment_plugin
description: mobile payment sdk plugin
version: 0.0.1
homepage: https://github.com/mohammadz0606/mobile_payment_plugin

environment:
  sdk: '>=3.1.4 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  plugin:
    platforms:
      android:
        package: com.sdk.mobilepaymentplugin
        pluginClass: MobilePaymentPlugin
      ios:
        pluginClass: MobilePaymentPlugin
